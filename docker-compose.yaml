x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
    MLFLOW_TRACKING_URI: http://mlflow:5000
    NEBIUS_API_KEY: ${NEBIUS_API_KEY}
    # absolute host path to the repo, needed because DockerOperator talks to the
    # HOST docker daemon (via the mounted socket below) and launches sibling
    # containers whose volume mounts must be host paths, not paths inside this
    # airflow container.
    PIPELINE_HOST_PROJECT_ROOT: ${PWD}
    PIPELINE_IMAGE: mlops-assignment-e2e-ml-pipeline-pipeline
  volumes:
    - .:/opt/airflow/project
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    command: ["airflow", "db", "migrate"]
    environment:
      <<: *airflow-common-env

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    volumes:
      - .:/opt/airflow/project
      - airflow-logs:/opt/airflow/logs
      # let this container's DockerOperator tasks reach the HOST docker daemon
      # (sibling-container pattern, not docker-in-docker)
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: always

  mlflow:
    <<: *airflow-common
    entrypoint: mlflow
    command: server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///opt/airflow/project/mlflow.db --default-artifact-root /opt/airflow/project/mlflow-artifacts
    ports:
      - "5000:5000"
    depends_on: {}
    restart: always

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlops-assignment-e2e-ml-pipeline-pipeline
    profiles: ["build-only"]  # never started by `up`; DockerOperator launches it directly via the docker socket

volumes:
  postgres-db-volume:
  airflow-logs:
